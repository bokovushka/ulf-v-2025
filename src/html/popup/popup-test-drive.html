<div class="modal modal--custom popup-test-drive fade" id="popup-test-drive" data-keyboard="false" tabindex="-1"
	aria-labelledby="popup-test-driveLabel" aria-hidden="true">
	<div class="container">
		<div class="modal-dialog modal-dialog-centered justify-content-center">
			<div class="modal-inner mx-n3 mx-sm-0">
				<div class="modal-content">
					<div class="modal-body p-0">
						<form class="form-popup-test-drive" autocomplete="off">
							<div class="row">
								<div class="col">
									<div class="d-flex align-items-start justify-content-between">
										<!-- <div class="modal-title font-weight-bolder mb-0">Залишились питання?</div> -->
										<button type="button" class="close" data-dismiss="modal" aria-label="Close">
											<span aria-hidden="true">
												<svg>
													<use xlink:href="img/icons/icons.svg#i-close"></use>
												</svg>
											</span>
										</button>
									</div>
								</div>
							</div>
							<div class="row">
								<div class="col-12 col-lg-6 d-none d-lg-flex">
									<div class="wrap-img mx-auto">
										<img src="img/14141af.jpg" alt="img" class="bg-down">
									</div>
								</div>
								<div class="col-12 col-lg-6 mb-8">
									<div class="form-inner ml-lg-5 ml-xl-13">
										<div class="head h4 mb-8">Записатись на тест-драйв</div>
										<div class="row">
											<div class="col-12">
												<div class="field mb-3">
													<label class="small-txt mb-2">Ваше імʼя</label>
													<input type="text" id="name" class="form-control mb-2"
														placeholder="Введіть ім’я">
													<div class="field--help-info small-txt text-red mb-2">Помилка введення</div>
												</div>
											</div>
											<div class="col-12">
												<div class="field mb-6">
													<label class="small-txt mb-2">Моб. телефон</label>
													<input type="tel" id="textInput" class="form-control mb-2"
														placeholder="+38 000 0000000">
													<div class="field--help-info small-txt text-red mb-2">Помилка введення</div>
												</div>
											</div>
										</div>
										<div class="row mb-8">
											<div class="col-12">
												<div class="car-calc">
													<div class="car-calc--summary flex-column">
														<div class="car-calc--head font-weight-bold mb-6">Tesla Model X 2022</div>
														<div class="field-wrap mb-3">
															<div class="field">
																<label class="small-txt mb-2">Дата</label>
																<div class="inner">
																	<div class="datepicker test-drive-date--wrap">
																		<input id="test-drive-date" class="form-control" type="text"
																			readonly data-input autocomplete="no-autofill-please"
																			placeholder="Від">
																	</div>
																</div>
															</div>
														</div>
														<div class="field-wrap mb-3">
															<div class="field">
																<label class="small-txt mb-2">Час</label>
																<div class="inner">
																	<div class="datepicker test-drive-time--wrap">
																		<input id="test-drive-time" class="form-control" type="text"
																			readonly placeholder="Від" data-toggle="modal"
																			data-target="#popup-test-drive-time">
																	</div>
																</div>
															</div>
														</div>
														<div class="field">
															<label class="small-txt mb-2">Моб. телефон</label>
															<input type="tel" id="textInput" class="form-control"
																placeholder="+38 000 0000000">
															<div class="field--help-info small-txt text-red mb-2">Записатись
															</div>
														</div>
													</div>
												</div>
											</div>
										</div>
										<div class="row mb-3">
											<div class="col-12">
												<button type="button" class="btn btn-main-blue btn-block"
													data-next-modal="#popup-test-drive-thank-you"
													data-dismiss="modal">Записатись</button>
											</div>
										</div>
										<div class="row">
											<div class="col-12">
												<div class="info text-center">Натискаючи на кнопку, Ви даєте згоду на обробку
													персональних даних
													відповідно
													до <a href="##">Політики конфіденційності</a>.</div>
											</div>
										</div>
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
