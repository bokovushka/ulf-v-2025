<div class="modal modal--custom popup-test-drive-time fade" id="popup-test-drive-time" data-keyboard="false"
	tabindex="-1" aria-labelledby="popup-test-drive-time-youLabel" aria-hidden="true" data-backdrop="true">
	<div class="modal-dialog modal-dialog-centered justify-content-center">
		<div class="modal-inner mx-n3 mx-sm-0">
			<div class="modal-content">
				<div class="modal-body p-0">

					<div class="time-popup text-center">

						<div class="time-popup__value">
							<span id="hours" class="time-part active">10</span>
							<span class="colon">:</span>
							<span id="minutes" class="time-part">00</span>
						</div>

						<div class="time-popup__controls">

							<button type="button" data-dir="up">
								<svg class="icon icon-up i-arrow-down">
									<use xlink:href="img/icons/icons.svg#i-arrow-down"></use>
								</svg>
							</button>
							<button type="button" data-dir="down">
								<svg class="icon i-arrow-down">
									<use xlink:href="img/icons/icons.svg#i-arrow-down"></use>
								</svg>
							</button>
						</div>
					</div>
					<button type="button" class="time-popup__done btn btn-text" data-dismiss="modal" aria-label="Close">
						Готово
					</button>
				</div>
			</div>
		</div>
	</div>
</div>
